name: drift-check

on:
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements-cpu.txt
      - name: Drift check
        run: |
          python mlops/evidently/drift_check.py \
            data/features/reference.parquet \
            data/features/current.parquet \
            reports/drift.html || echo "drift_detected=true" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: reports/drift.html
